<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Master: Premium Edition</title>
    
    <link rel="preconnect" href="https://dlhd.link" crossorigin>
    <link rel="dns-prefetch" href="https://dlhd.link">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.0/dist/hls.min.js"></script>
    
    <style>
        :root {
            --bg-deep: #07070a;
            --bg-glass: rgba(20, 20, 25, 0.65);
            --bg-card: rgba(255, 255, 255, 0.04);
            --bg-card-hover: rgba(255, 255, 255, 0.1);
            --border-light: rgba(255, 255, 255, 0.08);
            --accent-primary: #6366f1; 
            --accent-secondary: #ec4899; 
            --accent-yellow: #f59e0b;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981; 
            --accent-orange: #f97316;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --font-ui: 'Outfit', system-ui, sans-serif;
            --glow-shadow: 0 0 40px rgba(99, 102, 241, 0.2);
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            font-family: var(--font-ui);
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 10% 40%, rgba(99, 102, 241, 0.12), transparent 40%),
                radial-gradient(circle at 90% 60%, rgba(236, 72, 153, 0.08), transparent 40%),
                url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)" opacity="0.03"/></svg>');
            color: var(--text-main);
            height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        .view {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .view.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        #loadScreen { align-items: center; justify-content: center; padding: 20px; }

        .load-box {
            background: var(--bg-glass);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 40px; border-radius: 30px;
            width: 100%; max-width: 650px;
            box-shadow: var(--glow-shadow), inset 0 0 0 1px var(--border-light), 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            max-height: 90vh; overflow-y: auto;
        }
        .load-box::-webkit-scrollbar { width: 4px; }
        .load-box::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }

        h2 { font-weight: 300; letter-spacing: 3px; text-transform: uppercase; margin-top: 0; margin-bottom: 30px; font-size: 2.2rem; }
        h2 span { 
            font-weight: 800; 
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }

        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .url-input {
            flex: 1; background: rgba(0,0,0,0.4); border: 1px solid var(--border-light);
            color: #fff; padding: 16px 20px; border-radius: 16px; font-size: 1rem; font-family: var(--font-ui); transition: 0.3s;
        }
        .url-input:focus { border-color: var(--accent-primary); box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); background: rgba(0,0,0,0.6); }

        .login-form {
            display: none; background: rgba(0, 0, 0, 0.3);
            padding: 25px; border-radius: 20px; border: 1px solid var(--border-light);
            margin-bottom: 20px; animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        @keyframes slideDown { from {opacity:0; transform:translateY(-15px);} to {opacity:1; transform:translateY(0);} }

        .form-input {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--border-light);
            color: #fff; padding: 14px 18px; border-radius: 12px; margin-bottom: 12px;
            font-size: 0.95rem; font-family: monospace; transition: 0.3s;
        }
        .form-input:focus { border-color: var(--accent-primary); }

        .btn-action {
            width: 100%; padding: 16px; border-radius: 16px; border: 1px solid transparent;
            font-weight: 600; font-size: 1rem; cursor: pointer; font-family: var(--font-ui);
            transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 12px;
            margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px;
            position: relative; overflow: hidden;
        }
        .btn-action::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }
        .btn-action:hover::after { left: 100%; }
        .btn-action:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); filter: brightness(1.1); }
        
        .btn-gradient { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); color: #fff; }
        .btn-dark { background: rgba(255,255,255,0.05); border-color: var(--border-light); color: #fff; backdrop-filter: blur(5px); }
        .btn-dark:hover { background: rgba(255,255,255,0.1); border-color: var(--accent-primary); }
        .btn-outline { background: transparent; border-color: var(--accent-cyan); color: var(--accent-cyan); }
        .btn-outline:hover { background: rgba(6, 182, 212, 0.1); }

        .section-divider { 
            display: flex; align-items: center; margin: 30px 0; color: var(--text-dim); font-size: 0.85rem; letter-spacing: 2px;
        }
        .section-divider::before, .section-divider::after { content: ""; flex: 1; height: 1px; background: var(--border-light); margin: 0 15px; }

        #listView { padding: 30px 40px; max-width: 1600px; margin: 0 auto; }

        .header-controls {
            display: flex; gap: 15px; margin-bottom: 30px; align-items: center;
            background: var(--bg-glass); padding: 15px 25px; border-radius: 20px;
            backdrop-filter: blur(20px); border: 1px solid var(--border-light);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: sticky; top: 20px; z-index: 50;
        }
        
        .btn-icon {
            background: var(--bg-card); border: 1px solid var(--border-light);
            color: #fff; width: 50px; height: 50px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; font-size: 1.1rem;
        }
        .btn-icon:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); color: var(--accent-primary); border-color: var(--accent-primary); }

        #viewToggleBtn {
            width: auto; padding: 0 25px; margin: 0; height: 50px;
            border-radius: 14px; font-size: 1rem; text-transform: none; letter-spacing: 0;
            background: rgba(99, 102, 241, 0.15); border: 1px solid rgba(99, 102, 241, 0.4); color: #fff;
        }
        #viewToggleBtn:hover { background: var(--accent-primary); color: #fff; }

        .search-container { flex: 1; position: relative; }
        .search-input {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid transparent;
            padding: 15px 20px 15px 50px; border-radius: 14px; color: #fff; font-size: 1.1rem;
            font-family: var(--font-ui); transition: 0.3s;
        }
        .search-input:focus { border-color: var(--accent-primary); background: rgba(0,0,0,0.6); box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 1.1rem; }

        .list-content { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; padding-bottom: 40px;
        }

        .list-content.list-mode { display: flex; flex-direction: column; gap: 12px; }
        .list-content.list-mode .channel-card { flex-direction: row; padding: 12px 20px; align-items: center; border-radius: 16px; }
        .list-content.list-mode .card-logo { width: 45px; height: 45px; border-radius: 10px; }
        .list-content.list-mode .card-title { font-size: 1rem; margin-bottom: 4px; }
        .list-content.list-mode .play-overlay { position: static; transform: none; opacity: 1; width: 35px; height: 35px; font-size: 0.9rem; margin-left: auto; background: rgba(255,255,255,0.1); box-shadow: none; }
        .list-content.list-mode .channel-card:hover .play-overlay { background: var(--accent-primary); color: #fff; }

        .channel-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 20px; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); cursor: pointer;
            position: relative; overflow: hidden;
            backdrop-filter: blur(10px);
        }
        .channel-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.6)); z-index: 1; pointer-events: none; opacity: 0.5; transition: 0.3s;
        }
        .channel-card:hover::before { opacity: 0.8; }
        .channel-card:hover { 
            transform: translateY(-5px); 
            background: var(--bg-card-hover);
            border-color: rgba(99, 102, 241, 0.5); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.5), 0 0 20px rgba(99, 102, 241, 0.15); 
        }

        .card-top { display: flex; align-items: center; gap: 15px; z-index: 2; width: 100%; }
        .card-logo {
            width: 55px; height: 55px; border-radius: 14px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02)); 
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; color: #fff; overflow: hidden; flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05);
            font-size: 1.2rem; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .card-logo img { width: 100%; height: 100%; object-fit: cover; }

        .card-info { flex: 1; min-width: 0; z-index: 2; }
        .card-title { 
            font-weight: 600; font-size: 1.1rem; margin-bottom: 8px; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        .card-meta { display: flex; flex-wrap: wrap; gap: 6px; font-size: 0.75rem; }
        
        .badge { padding: 4px 8px; border-radius: 6px; font-weight: 800; text-transform: uppercase; font-size: 0.65rem; letter-spacing: 0.5px; }
        .bg-cyan { background: rgba(6, 182, 212, 0.15); color: var(--accent-cyan); border: 1px solid rgba(6, 182, 212, 0.3); }
        .bg-purple { background: rgba(99, 102, 241, 0.15); color: #a5b4fc; border: 1px solid rgba(99, 102, 241, 0.3); }
        .bg-orange { background: rgba(249, 115, 22, 0.15); color: var(--accent-orange); border: 1px solid rgba(249, 115, 22, 0.3); }
        .bg-gold { background: rgba(245, 158, 11, 0.15); color: var(--accent-yellow); border: 1px solid rgba(245, 158, 11, 0.3); }
        .bg-gray { background: rgba(255,255,255,0.05); color: var(--text-dim); border: 1px solid rgba(255,255,255,0.1); }
        .bg-pluto { background: rgba(6, 182, 212, 0.12); color: #67e8f9; border: 1px solid rgba(6, 182, 212, 0.35); }

        .play-overlay {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%) scale(0.8);
            width: 45px; height: 45px; border-radius: 50%; background: var(--accent-primary);
            display: flex; align-items: center; justify-content: center; color: #fff;
            opacity: 0; transition: 0.3s; z-index: 3; font-size: 1.1rem;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.6);
        }
        .channel-card:hover .play-overlay { opacity: 1; transform: translateY(-50%) scale(1); }

        #playerView { overflow: hidden; background: #000; }
        
        .player-header {
            position: absolute; top: 0; left: 0; width: 100%; height: 90px;
            display: flex; align-items: center; padding: 0 40px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index: 100; transition: opacity 0.3s; pointer-events: none; 
        }
        #playerView:hover .player-header { opacity: 1; }

        .btn-back-player {
            pointer-events: auto; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); 
            color: #fff; padding: 10px 20px; border-radius: 30px; cursor: pointer;
            display: flex; align-items: center; gap: 10px; font-weight: 600; font-family: var(--font-ui);
            transition: 0.3s; backdrop-filter: blur(10px); z-index: 101;
        }
        .btn-back-player:hover { background: #fff; color: #000; }

        #channelTitle {
            position: absolute; left: 50%; transform: translateX(-50%); pointer-events: auto;
            font-size: 1.4rem; font-weight: 800; letter-spacing: 1px;
            color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            display: flex; align-items: center; gap: 12px; white-space: nowrap;
        }
        
        .live-dot {
            width: 10px; height: 10px; background: #ef4444; border-radius: 50%;
            box-shadow: 0 0 10px #ef4444; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .player-wrapper { 
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative;
        }
        
        .cinematic-glow {
            position: absolute; top: 10%; left: 10%; right: 10%; bottom: 10%;
            background: var(--accent-primary); filter: blur(120px); opacity: 0.2; z-index: 1;
            pointer-events: none; transition: background 1s ease;
        }

        .video-container { width: 100%; height: 100%; z-index: 2; position: relative; background: #000; }
        video, iframe { width: 100%; height: 100%; border: none; display: block; }
        #foxContainer, #daddyContainer { display: none; width: 100%; height: 100%; background: #000; }

        .screen-controls { position: absolute; bottom: 30px; right: 30px; z-index: 100; display: flex; gap: 15px; pointer-events: auto; }
        .ctl-btn {
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; width: 45px; height: 45px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
            transition: 0.3s; backdrop-filter: blur(10px);
        }
        .ctl-btn:hover { background: var(--accent-primary); border-color: var(--accent-primary); transform: scale(1.1); box-shadow: 0 0 15px var(--accent-primary); }

        #btnExternal { display: none; background: rgba(249, 115, 22, 0.4); border-color: rgba(249, 115, 22, 0.8); }
        #btnExternal:hover { background: var(--accent-orange); box-shadow: 0 0 15px var(--accent-orange); }

        .res-badge {
            position: absolute; top: 30px; left: 30px; z-index: 20;
            background: rgba(0,0,0,0.6); color: var(--accent-green); 
            padding: 6px 12px; border-radius: 8px; font-weight: 600; font-size: 0.8rem;
            pointer-events: none; border: 1px solid rgba(16, 185, 129, 0.3); backdrop-filter: blur(5px);
        }

        @media (max-width: 768px) {
            #listView { padding: 15px; }
            .header-controls { flex-wrap: wrap; padding: 10px; top: 10px; border-radius: 16px; }
            .search-container { flex: 1 1 100%; order: 3; margin-top: 5px; }
            .search-input { padding: 12px 15px 12px 40px; font-size: 1rem; }
            .btn-icon { width: 45px; height: 45px; }
            #viewToggleBtn { margin-left: auto; height: 45px; padding: 0 15px; }
            
            .list-content { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
            .channel-card { padding: 15px; gap: 10px; }
            .card-logo { width: 45px; height: 45px; }
            .card-title { font-size: 0.95rem; }
            .card-meta { gap: 4px; }
            .badge { padding: 3px 6px; font-size: 0.55rem; }
            .list-content.list-mode { gap: 8px; }

            .player-header { padding: 0 15px; height: 70px; }
            .btn-back-player .back-text { display: none; }
            .btn-back-player { padding: 10px 15px; }
            #channelTitle { font-size: 1.1rem; max-width: 55%; overflow: hidden; text-overflow: ellipsis; justify-content: center; }
            
            .screen-controls { bottom: 20px; right: 20px; gap: 10px; }
            .ctl-btn { width: 40px; height: 40px; font-size: 1rem; }
            .res-badge { top: auto; bottom: 20px; left: 20px; }
        }
    </style>
</head>
<body>

    <div id="loadScreen" class="view active">
        <div class="load-box">
            <h2>IPTV <span>MASTER</span></h2>
            
            <div id="inputContainer">
                <div class="input-row">
                    <input type="text" class="url-input" value="https://iptv-org.github.io/iptv/index.m3u" placeholder="Playlist URL...">
                    <button class="btn-action btn-dark" onclick="removeRow(this)" style="width:55px; margin:0; padding:0;"><i class="fa-solid fa-times"></i></button>
                </div>
            </div>
            
            <button class="btn-action btn-dark" onclick="addInputRow()" style="padding: 12px; font-size: 0.9rem;">
                <i class="fa-solid fa-plus"></i> Add Another M3U
            </button>

            <button class="btn-action btn-gradient" onclick="loadAllPlaylists()">
                <i class="fa-solid fa-play"></i> LOAD URL PLAYLISTS
            </button>

            <div class="section-divider">ADVANCED CONNECTION</div>

            <button class="btn-action btn-outline" onclick="toggleForm('xtreamForm')">
                <i class="fa-solid fa-server"></i> Connect via Xtream
            </button>

            <div id="xtreamForm" class="login-form">
                <input type="text" id="xcUrl" class="form-input" placeholder="Server URL (http://...)">
                <input type="text" id="xcUser" class="form-input" placeholder="Username">
                <input type="text" id="xcPass" class="form-input" placeholder="Password">
                <button class="btn-action" style="background:var(--accent-cyan); color:#000;" onclick="connectXtream()">LOGIN XTREAM</button>
            </div>

            <button class="btn-action btn-outline" style="border-color:var(--accent-orange); color:var(--accent-orange);" onclick="toggleForm('stalkerForm')">
                <i class="fa-solid fa-microchip"></i> Connect Stalker / MAG
            </button>

            <div id="stalkerForm" class="login-form">
                <div style="text-align: left; margin-bottom: 12px; font-size: 0.8rem; color: var(--accent-orange);">
                    <i class="fa-solid fa-info-circle"></i> Requires proxy.php in same folder
                </div>
                <input type="text" id="stPortal" class="form-input" style="border-color:var(--accent-orange);" placeholder="Portal Address">
                <input type="text" id="stMac" class="form-input" style="border-color:var(--accent-orange);" placeholder="MAC Address" onkeyup="formatMac(this)" maxlength="17">
                <input type="text" id="stSn" class="form-input" style="border-color:var(--accent-orange);" placeholder="Serial Number (Optional)">
                <input type="text" id="stDevId" class="form-input" style="border-color:var(--accent-orange);" placeholder="Device ID (Optional)">
                
                <button class="btn-action" style="background:var(--accent-orange); color:#000;" onclick="connectStalker()">
                    <i class="fa-solid fa-plug"></i> CONNECT PORTAL
                </button>
            </div>

            <input type="file" id="fileInput" accept=".m3u,.m3u8" style="display:none;" onchange="handleFileUpload(this)">
            
            <div style="display: flex; gap: 15px; margin-top: 15px;">
                <button class="btn-action btn-dark" style="flex:1; margin:0;" onclick="document.getElementById('fileInput').click()">
                    <i class="fa-solid fa-file-arrow-up"></i> Upload File
                </button>
                <button class="btn-action btn-dark" style="flex:1; margin:0; border-color:rgba(245, 158, 11, 0.4);" onclick="loadPremium()">
                    <i class="fa-solid fa-crown" style="color:var(--accent-yellow)"></i> Premium
                </button>
            </div>

            <div style="display: flex; gap: 15px; margin-top: 15px;">
                <button class="btn-action btn-dark" style="flex:1; margin:0; border-color:rgba(99, 102, 241, 0.5);" onclick="loadDaddyLive()">
                    <i class="fa-solid fa-satellite-dish" style="color:#a5b4fc"></i> Daddy Live
                </button>
                <button class="btn-action btn-dark" style="flex:1; margin:0; border-color:rgba(239, 68, 68, 0.4);" onclick="loadFoxTV()">
                    <i class="fa-solid fa-tv" style="color:#ef4444"></i> Fox TV
                </button>
            </div>

            <div style="display: flex; gap: 15px; margin-top: 15px;">
                <button class="btn-action btn-dark" style="flex:1; margin:0; border-color:rgba(6, 182, 212, 0.5);" onclick="loadPlutoTV()">
                    <i class="fa-solid fa-circle-play" style="color:var(--accent-cyan)"></i> Pluto TV
                </button>
            </div>

            <div id="statusLog" style="margin-top:25px; text-align:left; color:var(--text-dim); font-size:0.85rem; font-family:monospace; max-height: 100px; overflow-y: auto;"></div>
        </div>
    </div>

    <div id="listView" class="view">
        <div class="header-controls">
            <button class="btn-icon" onclick="navigateBack()" title="Back to Home">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            
            <button class="btn-action btn-dark" id="viewToggleBtn" onclick="toggleListViewMode()" title="Toggle View Mode">
                <i class="fa-solid fa-list"></i> <span id="viewToggleText">List View</span>
            </button>
            
            <div class="search-container">
                <i class="fa-solid fa-search search-icon"></i>
                <input type="text" id="channelSearch" class="search-input" placeholder="Search channels or groups..." oninput="handleSearch()">
            </div>
        </div>
        <div id="listContent" class="list-content"></div>
    </div>

    <div id="playerView" class="view">
        <div class="player-header">
            <button class="btn-back-player" onclick="navigateBack()">
                <i class="fa-solid fa-arrow-left"></i> <span class="back-text">Back</span>
            </button>
            
            <div id="channelTitle">

            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));

            if (el) el.classList.add('active');
            currentView = viewName;
            if(viewName === 'list') {
                document.getElementById('channelSearch').value = ''; 
                setTimeout(() => document.getElementById('channelSearch').focus(), 100);
            }
        }

        function navigateTo(viewName, pushState = true) {
            if(currentView === 'player' && viewName !== 'player') stopPlayer();
            switchView(viewName);
            if(pushState) history.pushState({ view: viewName }, '', `#${viewName}`);
        }

        function navigateBack() { history.back(); }

            if (e.state && e.state.view) {

        // --- UI UTILS ---
        function toggleForm(id) {
            ['xtreamForm', 'stalkerForm'].forEach(fid => { if(fid !== id) document.getElementById(fid).style.display = 'none'; });
            const form = document.getElementById(id);
            form.style.display = (form.style.display === 'block') ? 'none' : 'block';
        }

        function formatMac(input) {
            let r = input.value.replace(/[^0-9a-fA-F]/g,"");
            if(r.length > 2) {
                let groups = [];
                for(let i=0; i<r.length; i+=2) groups.push(r.substr(i,2));
                input.value = groups.join(":").toUpperCase();
            } else { input.value = r.toUpperCase(); }
        }

        function logStatus(msg, type='info') {
            const log = document.getElementById('statusLog');
            let color = 'var(--text-dim)';
            if(type === 'error') color = '#ef4444';
            if(type === 'success') color = '#10b981';
            log.innerHTML += `<div style="color:${color}; margin-bottom:6px;"><i class="fa-solid fa-angle-right" style="font-size:0.7rem; margin-right:5px;"></i> ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        function toggleListViewMode() {
            isListViewMode = !isListViewMode;
            const container = document.getElementById('listContent');
            const icon = document.querySelector('#viewToggleBtn i');
            const textSpan = document.getElementById('viewToggleText');
            if(isListViewMode) {
                container.classList.add('list-mode');
                icon.className = 'fa-solid fa-border-all';
                textSpan.innerText = ' Grid View';
            } else {
                container.classList.remove('list-mode');
                icon.className = 'fa-solid fa-list';
                textSpan.innerText = ' List View';
            }
        }

        // --- DATA LOADING LOGIC ---
        async function connectXtream() {
            const url = document.getElementById('xcUrl').value.trim();
            const user = document.getElementById('xcUser').value.trim();
            const pass = document.getElementById('xcPass').value.trim();
            if(!url || !user || !pass) return alert("Please fill in all Xtream fields.");
            const btn = document.querySelector('#xtreamForm .btn-action');
            const originalText = btn.innerText;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> CONNECTING...';
            logStatus("Contacting Xtream Server...", 'info');
            try {
                const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(`${url}/player_api.php?username=${user}&password=${pass}&action=get_live_streams`);
                const response = await fetch(proxyUrl);
                if(!response.ok) throw new Error("Server connection failed");
                const data = await response.json();
                if(data.length === 0) throw new Error("No channels found or invalid credentials");
                allChannels = data.map(channel => ({
                    name: channel.name, group: "XTREAM LIVE", source: "XC", logo: channel.stream_icon,
                    url: `${url}/live/${user}/${pass}/${channel.stream_id}.m3u8`
                }));
                logStatus(`Xtream Connected! Loaded ${allChannels.length} channels`, 'success');
                renderList(allChannels); navigateTo('list');
            } catch (e) {
                logStatus(`Xtream Error: ${e.message}`, 'error');
                alert("Connection failed. Check URL/Credentials or CORS restriction.");
            } finally { btn.innerHTML = originalText; }
        }

        async function connectStalker() {
            const portal = document.getElementById('stPortal').value.trim();
            const mac = document.getElementById('stMac').value.trim();
            const sn = document.getElementById('stSn').value.trim();
            const devId = document.getElementById('stDevId').value.trim();
            if (!portal || !mac) return alert("Portal Address and MAC are required.");
            const btn = document.querySelector('#stalkerForm .btn-action');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> CONNECTING...';
            try {
                logStatus("Authenticating with Stalker...", 'info');
                const response = await fetch(`proxy.php?action=get_channels&portal=${encodeURIComponent(portal)}&mac=${encodeURIComponent(mac)}&sn=${encodeURIComponent(sn)}&device_id=${encodeURIComponent(devId)}`);
                if(!response.ok) throw new Error("Proxy connection failed.");
                const data = await response.json();
                const channels = data.js ? data.js.data : (data.items ? data.items : []);
                if (!channels || channels.length === 0) throw new Error("Authentication failed or no channels found.");
                allChannels = channels.map(ch => ({
                    name: ch.name, group: "STALKER TV", source: "MAG", logo: ch.logo,
                    cmd: ch.cmd, portal_url: portal, mac_address: mac, isStalker: true
                }));
                logStatus(`Stalker Connected! Loaded ${allChannels.length} channels`, 'success');
                toggleForm('stalkerForm'); renderList(allChannels); navigateTo('list');
            } catch (e) {
                logStatus(`Stalker Error: ${e.message}`, 'error'); alert("Connection Failed. Check credentials or proxy.");
            } finally { btn.innerHTML = '<i class="fa-solid fa-plug"></i> CONNECT PORTAL'; }
        }

        function handleFileUpload(input) {
            const file = input.files[0];
            if (!file) return;
            logStatus(`Reading file: ${file.name}...`, 'info');
            const reader = new FileReader();
            reader.onload = function(e) {
                const newChannels = parseM3U(e.target.result, "LOCAL FILE");
                if (newChannels.length > 0) {
                    allChannels = newChannels;
                    logStatus(`Loaded ${allChannels.length} channels`, 'success');
                    renderList(allChannels); navigateTo('list');
                } else { alert("Invalid M3U file"); }
            };
            reader.readAsText(file);
        }

        function loadPlutoTV() {
            allChannels = plutoChannels.map(ch => ({ ...ch, source: "PLUTO", isIframe: false }));
            renderList(allChannels);
            navigateTo('list');
        }

        function loadDaddyLive() {
            allChannels = dlChannels.map((item) => {
                const embedUrl = `https://daddylive.cv/embed/stream.php?id=${item.id}&player=1&source=tv`;
                return {
                    name: item.name,
                    group: item.group || "DADDYLIVE",
                    source: "DLHD",
                    url: embedUrl,
                    logo: item.logo || null,
                    isIframe: true,
                    isDaddy: true
                };
            });
            renderList(allChannels);
            navigateTo('list');
        }

        function loadFoxTV() {
            decidePlayer("https://dlhd.link/stream/stream-54.php", true, true, "FOX TV", null);
        }

        async function loadPremium() {
            logStatus("Fetching Premium channels...", 'info');
            const staticChannels = [
                { name: "Aaj Tak HD", url: "https://feeds.intoday.in/aajtak/api/aajtakhd/master.m3u8", logo: "https://i.imgur.com/RpIdCB3.png", group: "News", source: "PREMIUM" },
                { name: "India TV", url: "https://d7d3gu3ex55r8.cloudfront.net/out/v1/70e7a2b9703643799863c03cb7923720/index.m3u8", group: "News", source: "PREMIUM" }
            ];
            try {
                const response = await fetchSmart('https://iptv-org.github.io/iptv/countries/in.m3u');
                const dynamicChannels = parseM3U(response, "PREMIUM");
                allChannels = [...staticChannels, ...dynamicChannels];
                renderList(allChannels); navigateTo('list');
            } catch (e) {
                allChannels = staticChannels;
                renderList(allChannels); navigateTo('list');
            }
        }

        async function loadAllPlaylists() {
            const inputs = document.querySelectorAll('.url-input');
            document.getElementById('statusLog').innerHTML = '';
            let urls = [];
            inputs.forEach(input => { if(input.value.trim()) urls.push(input.value.trim()); });
            if(urls.length === 0) return alert("Please enter a URL.");
            allChannels = [];
            logStatus("Connecting...", 'info');
            const btn = document.querySelector('.btn-gradient');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> LOADING...';
            for (let i = 0; i < urls.length; i++) {
                let url = urls[i]; let sourceLabel = 'List ' + (i+1);
                try {
                    const content = await fetchSmart(url);
                    const newChannels = parseM3U(content, sourceLabel);
                    if(newChannels.length > 0) {
                        logStatus(`Loaded ${newChannels.length} from ${sourceLabel}`, 'success');
                        allChannels = allChannels.concat(newChannels);
                    } else { logStatus(`Empty playlist: ${sourceLabel}`, 'error'); }
                } catch (e) { logStatus(`Failed to load: ${sourceLabel}`, 'error'); }
            }
            btn.innerHTML = '<i class="fa-solid fa-play"></i> LOAD URL PLAYLISTS';
            if(allChannels.length > 0) { renderList(allChannels); navigateTo('list'); }
            else { alert("No channels found. Check logs."); }
        }

        async function fetchSmart(url) {
            try { const r = await fetch(url); if (r.ok) return await r.text(); throw new Error(); }
            catch {
                try { const r = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(url)); if (r.ok) return await r.text(); throw new Error(); }
                catch {
                    const r = await fetch('https://corsproxy.io/?' + encodeURIComponent(url)); if (r.ok) return await r.text(); throw new Error();
                }
            }
        }

        function parseM3U(content, sourceLabel) {
            const lines = content.split('\n');
            const channels = []; let current = {};
            lines.forEach(line => {
                line = line.trim();
                if(line.startsWith('#EXTINF:')) {
                    const logo = line.match(/tvg-logo="([^"]*)"/); const group = line.match(/group-title="([^"]*)"/);
                    const name = line.substring(line.lastIndexOf(',') + 1).trim();
                    current.logo = logo ? logo[1] : null; current.group = group ? group[1] : 'General'; current.name = name || 'Unknown Channel';
                } else if(line.startsWith('http') || line.endsWith('.m3u8') || line.endsWith('.ts')) {
                    current.url = line; current.source = sourceLabel; current.isIframe = false;
                    if(current.name) channels.push(current);
                    current = {};
                }
            });
            return channels;
        }

        function addInputRow() {
            const container = document.getElementById('inputContainer');
            const div = document.createElement('div'); div.className = 'input-row';
            div.innerHTML = `<input type="text" class="url-input" placeholder="Another Playlist URL..."><button class="btn-action btn-dark" onclick="removeRow(this)" style="width:55px; margin:0; padding:0;"><i class="fa-solid fa-times"></i></button>`;
            container.appendChild(div);
        }
        function removeRow(btn) { btn.parentElement.remove(); }

        // --- RENDER & SEARCH ---
        function renderList(channels) {
            const container = document.getElementById('listContent');
            container.innerHTML = '';
            const subset = channels.slice(0, RENDER_LIMIT);
            const fragment = document.createDocumentFragment();
            subset.forEach(ch => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.onclick = () => decidePlayer(ch.url || ch.cmd, ch.isIframe, ch.isDaddy, ch.name, ch);
                let badgeClass = 'bg-cyan';
                if(ch.group === 'DADDYLIVE') badgeClass = 'bg-purple';
                if(ch.group === 'XTREAM LIVE') badgeClass = 'bg-green';
                if(ch.source === 'MAG') badgeClass = 'bg-orange';
                if(ch.source === 'PREMIUM') badgeClass = 'bg-gold';
                if(ch.source === 'PLUTO' || ch.group === 'Pluto TV') badgeClass = 'bg-pluto';
                const logoHtml = ch.logo
                    ? `<img src="${ch.logo}" onerror="this.style.display='none'">`
                    : `${ch.name.substring(0,2).toUpperCase()}`;
                card.innerHTML = `
                    <div class="card-top">
                        <div class="card-logo">${logoHtml}</div>
                        <div class="card-info">
                            <div class="card-title">${ch.name}</div>
                            <div class="card-meta">
                                <span class="badge ${badgeClass}">${ch.source || 'LIVE'}</span>
                                <span class="badge bg-gray">${ch.group || 'CH'}</span>
                            </div>
                        </div>
                    </div>
                    <div class="play-overlay"><i class="fa-solid fa-play"></i></div>
                `;
                fragment.appendChild(card);
            });
            container.appendChild(fragment);
            if(channels.length > RENDER_LIMIT) {
                const info = document.createElement('div');
                info.style.gridColumn = '1 / -1';
                info.style.textAlign = 'center'; info.style.color = 'var(--text-dim)'; info.style.padding = '30px';
                info.innerText = `Showing top ${RENDER_LIMIT} of ${channels.length} channels... (Use search for more)`;
                container.appendChild(info);
            }
        }

        function handleSearch() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                const term = document.getElementById('channelSearch').value.toLowerCase();
                const filtered = allChannels.filter(ch =>
                    ch.name.toLowerCase().includes(term) ||
                    (ch.group && ch.group.toLowerCase().includes(term))
                );
                renderList(filtered);
            }, 300);
        }

        // --- PLAYER LOGIC ---
        async function decidePlayer(urlOrCmd, isIframe, isDaddy, name, channelObj) {
            navigateTo('player');
            document.getElementById('channelNameText').innerText = name || 'LIVE STREAM';
            const glowColors = ['#6366f1', '#ec4899', '#f59e0b', '#06b6d4', '#10b981'];
            document.getElementById('cinemaGlow').style.background = glowColors[Math.floor(Math.random() * glowColors.length)];
            if (channelObj && channelObj.isStalker) {
                resBadge.innerText = "GENERATING LINK..."; resBadge.style.color = "var(--accent-orange)";
                try {
                    const response = await fetch(`proxy.php?action=create_link&cmd=${encodeURIComponent(channelObj.cmd)}&portal=${encodeURIComponent(channelObj.portal_url)}&mac=${encodeURIComponent(channelObj.mac_address)}`);
                    const data = await response.json();
                    let streamUrl = data.js ? data.js.cmd : null;
                    if(streamUrl) {
                        streamUrl = streamUrl.replace('ffmpeg ', '').replace('auto ', '');
                        playHLS(streamUrl);
                    } else { throw new Error("No link"); }
                } catch(e) {
                    alert("Error playing channel: Link expired or server blocked IP.");
                    navigateBack();
                }
                return;
            }
            if(isIframe) playIframe(urlOrCmd, isDaddy ? "DADDY LIVE" : "LIVE STREAM", isDaddy ? "daddy" : "iframe");
            else playHLS(urlOrCmd);
        }

        function playIframe(url, label, type) {
            stopPlayer();
            let target = (type === 'fox' || type === 'iframe') ? foxContainer : daddyContainer;
            target.style.display = 'block';
            btnExternal.style.display = 'flex';
            btnExternal.onclick = () => window.open(url, '_blank');
            const isDaddyLink = url.includes('daddylive.cv') || url.includes('dlhd.link') || url.includes('dlstreams.top');
            const referrerAttr = isDaddyLink ? 'referrerpolicy="no-referrer"' : '';
            target.innerHTML = `<iframe src="${url}" width="100%" height="100%" style="border:0;" allowfullscreen ${referrerAttr}></iframe>`;
            resBadge.innerText = label; resBadge.style.color = "var(--accent-secondary)";
        }

        function playHLS(url) {
            stopPlayer();
            video.style.display = 'block';
            btnExternal.style.display = 'none';
            resBadge.innerText = "LIVE STREAM"; resBadge.style.color = "var(--accent-cyan)";
            if(Hls.isSupported()) {
                hls = new Hls({maxBufferLength: 30});
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(e=>console.log("Autoplay block")));
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play().catch(e=>console.log("Autoplay block"));
            }
        }

        function stopPlayer() {
            if(video) { video.pause(); video.removeAttribute('src'); video.load(); video.style.display = 'none'; }
            if(hls) { hls.destroy(); hls = null; }
            if(foxContainer) { foxContainer.innerHTML = ''; foxContainer.style.display = 'none'; }
            if(daddyContainer) { daddyContainer.innerHTML = ''; daddyContainer.style.display = 'none'; }
            btnExternal.style.display = 'none';
        }

        function reloadStream() {
            const isIframe = (foxContainer.style.display === 'block' || daddyContainer.style.display === 'block');
            if(isIframe) {
                const target = (daddyContainer.style.display === 'block') ? daddyContainer : foxContainer;
                const iframe = target.querySelector('iframe');
                if(iframe) {
                    const src = iframe.src;
                    const isDaddy = src.includes('daddylive.cv') || src.includes('dlhd.link') || src.includes('dlstreams.top');
                    const ref = isDaddy ? 'referrerpolicy="no-referrer"' : '';
                    target.innerHTML = '';
                    setTimeout(() => { target.innerHTML = `<iframe src="${src}" width="100%" height="100%" style="border:0;" allowfullscreen ${ref}></iframe>`; }, 100);
                }
            } else {
                if(hls) { hls.stopLoad(); hls.startLoad(); video.play(); }
            }
        }

        function toggleCustomFullscreen() {
            if (!document.fullscreenElement) playerBody.requestFullscreen().catch(err => alert(`Fullscreen Error: ${err.message}`));
            else document.exitFullscreen();
        }
    </script>
</body>
